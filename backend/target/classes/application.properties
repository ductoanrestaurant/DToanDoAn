# =====================================================
# PostgreSQL - Đọc từ environment variable
# =====================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/DucToanRestaurant}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Server
server.address=0.0.0.0
server.port=${PORT:8080}

# =====================================================
# JWT Secret Key
# =====================================================
jwt.secret=${JWT_SECRET:c2VjcmV0a2V5Zm9yand0c2VjdXJpdHlzcHJpbmdib290YXBwbGljYXRpb24=}

# =====================================================
# Custom API Keys
# =====================================================
nhanVien.api.key=${NHANVIEN_API_KEY:nguyenductoan123456}

# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY:your-gemini-api-key-here}
gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent}

# PayOS Configuration
payos.client-id=${PAYOS_CLIENT_ID:your-payos-client-id}
payos.api-key=${PAYOS_API_KEY:your-payos-api-key}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:your-payos-checksum-key}

# =====================================================
# Upload Directory
# =====================================================
app.upload.dir=${UPLOAD_DIR:./image-dir}
